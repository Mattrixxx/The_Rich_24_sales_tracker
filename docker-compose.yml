version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: rich24_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: rich24
      POSTGRES_PASSWORD: rich24password
      POSTGRES_DB: rich24_sales
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
