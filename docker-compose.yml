version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: dockerfile
    container_name: nextjs-app
    restart: unless-stopped
    ports:
      - "3012:3012"
    env_file:
      - .env
    depends_on:
      - postgres
    networks:
      - default

networks:
  # Network ของตัวเอง
  default:
  
  # เชื่อมต่อไปยัง Network ภายนอกที่ Container อื่นๆ รันอยู่
  db_net:
    external: true
    name: api_smart-restaurant-network
 